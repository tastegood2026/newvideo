<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>给你的话</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:"Microsoft YaHei";
background:#000;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url(bg.jpg) center/cover;
filter:blur(6px) brightness(.45);
transform:scale(1.12);
}

.container{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

z-index:5;

text-align:center;

}

.avatar{

width:210px;

height:210px;

border-radius:50%;

overflow:hidden;

border:5px solid rgba(255,255,255,.9);

box-shadow:0 0 50px rgba(255,255,255,.8);

animation:breathe 3s infinite;

margin:auto;

}

.avatar img{

width:100%;

height:100%;

object-fit:cover;

}

@keyframes breathe{

50%{
transform:scale(1.05)
}

}

.text{

margin-top:35px;

width:360px;

min-height:180px;

color:white;

font-size:22px;

line-height:1.9;

text-shadow:0 0 15px black;

opacity:1;

transition:.5s;

padding:10px;

}

.heart{

position:absolute;

font-size:34px;

pointer-events:none;

animation:fly linear forwards;

}

@keyframes fly{

0%{

opacity:1;

transform:translateY(0) scale(.7);

}

100%{

opacity:0;

transform:translateY(-300px) scale(1.8);

}

}

.tap{

position:absolute;

bottom:50px;

width:100%;

text-align:center;

color:white;

font-size:15px;

z-index:9;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="avatar">

<img src="avatar.jpg">

</div>

<div id="text" class="text"></div>

</div>

<div class="tap">轻触开始</div>

<audio id="music" loop playsinline webkit-playsinline>
<source src="music.mp3">
</audio>

<script>

const paragraphs=[

`提笔写下这些话的时候，窗外的风似乎都温柔了几分，而我的脑海里，反反复复浮现的，都是你的模样。`,

`我从来没想过，一个人的出现，会让原本平淡的日子开始有了期待。会在清晨醒来的时候，下意识想和你说一句早安。`,

`会在看到好看的晚霞、遇见有趣的事情、吃到好吃的东西时，第一个想分享给你。`,

`那些细碎又平常的瞬间里，喜欢慢慢生根发芽。`,

`你像一束温柔的光，照进我的生活。`,

`喜欢你这件事，不是一时兴起。`,

`而是在无数个平凡瞬间里，越来越确定。`

]

const text=document.getElementById("text")

let index=0

function typeText(str){

text.innerHTML=""

let i=0

let timer=setInterval(()=>{

text.innerHTML+=str[i]

i++

if(i>=str.length){

clearInterval(timer)

}

},35)

}

function speak(content){

speechSynthesis.cancel()

let speech=new SpeechSynthesisUtterance(content)

speech.lang="zh-CN"

speech.rate=1.05

speech.pitch=.75

speech.volume=1

const voices=speechSynthesis.getVoices()

const male=voices.find(v=>

v.lang.includes("zh") ||

v.name.includes("Male")

)

if(male){

speech.voice=male

}

speech.onend=()=>{

text.style.opacity=0

setTimeout(()=>{

index++

showNext()

},500)

}

speechSynthesis.speak(speech)

}

function showNext(){

if(index>=paragraphs.length){

text.innerHTML="❤"

return

}

text.style.opacity=1

typeText(paragraphs[index])

speak(paragraphs[index])

}

function createHeart(){

const h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=Math.random()*window.innerWidth+"px"

h.style.top=window.innerHeight+"px"

h.style.fontSize=(20+Math.random()*35)+"px"

h.style.animationDuration=(2+Math.random()*2)+"s"

h.style.color=`rgba(255,${50+Math.random()*100},${100+Math.random()*100},0.9)`

document.body.appendChild(h)

setTimeout(()=>{

h.remove()

},4000)

}

setInterval(createHeart,120)

document.body.addEventListener("click",()=>{

document.querySelector(".tap")?.remove()

const m=document.getElementById("music")

m.volume=.7

m.play().catch(()=>{})

showNext()

},{once:true})

</script>

</body>
</html>
