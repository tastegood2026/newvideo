<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>最后的话</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Microsoft YaHei",sans-serif;
background:#000;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* 背景图 */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: url("my_girl.png") center center/cover no-repeat;
filter:blur(12px) brightness(35%);
transform:scale(1.1);
z-index:-3;
}

/* 遮罩 */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
z-index:-2;
}

/* 星星 */
.star{
position:absolute;
color:white;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-50px);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

/* 主体 */
.container{
width:90%;
max-width:500px;
text-align:center;
}

.avatar-box{
width:150px;
height:150px;
margin:auto;
border-radius:50%;
padding:5px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,.15);
animation:breathe 4s infinite;
}

.avatar-box img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

@keyframes breathe{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.05);
}
}

#text{
margin-top:35px;
font-size:28px;
font-weight:600;
line-height:1.8;
color:white;
min-height:120px;
text-shadow:0 0 20px rgba(255,255,255,.2);
}

.char{
display:inline-block;
animation:show .25s forwards;
opacity:0;
}

@keyframes show{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* 开始页面 */
#start{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

#start h2{
color:white;
margin-bottom:20px;
font-weight:normal;
}

#start button{
padding:15px 40px;
border:none;
border-radius:50px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div id="start">
<h2>点一下开始</h2>
<button id="playBtn">开始</button>
</div>

<div class="container">

<div class="avatar-box">
<img src="avatar.jpg">
</div>

<div id="text"></div>

</div>

<audio id="bgm" loop preload="auto">
<source src="我只能离开.mp3" type="audio/mpeg">
</audio>

<script>

const lines = [
"宝宝",
"这可能是我最后一次叫你宝宝了",
"我想了很久",
"也终于想通了",
"也许放手是我最好的选择",
"我爱你是真的",
"因为你伤心也是真的",
"我想或许我不再纠缠你",
"不再打扰你",
"你就能开心",
"我真的好喜欢你",
"但是我忘了你没有遇到我时",
"那么开朗",
"那么爱笑",
"我就知道我该放手了",
"我比任何人都爱你",
"但是我却比不过任何人",
"很抱歉这段时间对你的打扰",
"我只想你好好的",
"只想要你天天开心",
"我希望我的离开能让你开心",
"遇到你是我这辈子最大的幸运",
"但是失去你也是我这辈子最大的遗憾",
"再也不见了",
"您"
];

const textBox = document.getElementById("text");
const audio = document.getElementById("bgm");

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

async function showLine(str){

textBox.innerHTML="";

for(let i=0;i<str.length;i++){

const span=document.createElement("span");
span.className="char";
span.innerText=str[i];

textBox.appendChild(span);

await sleep(120);
}

await sleep(2200);

textBox.style.opacity="0";

await sleep(800);

textBox.style.opacity="1";
}

async function startText(){

for(let i=0;i<lines.length;i++){

await showLine(lines[i]);

}

}

/* 星星 */
function createStar(){

const star=document.createElement("div");

star.className="star";

star.innerHTML=Math.random()>0.5 ? "✦" : "✧";

star.style.left=Math.random()*100+"vw";

star.style.fontSize=(10+Math.random()*15)+"px";

star.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(star);

setTimeout(()=>{
star.remove();
},10000);
}

setInterval(createStar,150);

/* 微信兼容播放 */

function playMusic(){

audio.play();

document.addEventListener("WeixinJSBridgeReady",function(){

audio.play();

},false);

if(typeof WeixinJSBridge=="object"){

WeixinJSBridge.invoke("getNetworkType",{},function(){

audio.play();

});

}
}

document.getElementById("playBtn").onclick=function(){

playMusic();

document.getElementById("start").style.display="none";

startText();

};

</script>

</body>
</html>
