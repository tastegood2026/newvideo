<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>给你的话</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:"Microsoft YaHei";
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url("bg.jpg") center/cover;
filter:blur(4px) brightness(0.55);
transform:scale(1.1);
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
}

.avatar-box{
width:180px;
height:180px;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,.8);
box-shadow:0 0 40px rgba(255,255,255,.8);
animation:breathe 3s infinite;
margin:auto;
position:relative;
}

.avatar-box img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.text{
margin-top:35px;
width:320px;
color:white;
font-size:20px;
line-height:1.8;
min-height:150px;
text-shadow:0 0 12px black;
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 4s linear forwards;
}

@keyframes float{
0%{
opacity:1;
transform:translateY(0) scale(.5);
}
100%{
opacity:0;
transform:translateY(-260px) scale(1.4);
}
}

.tap{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:white;
font-size:14px;
opacity:.7;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="avatar-box">
<img src="avatar.jpg">
</div>

<div class="text" id="text"></div>

</div>

<div class="tap">
轻触页面开始
</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

const lines=[

"提笔写下这些话的时候，窗外的风似乎都温柔了几分，而我的脑海里，反反复复浮现的，都是你的模样。",

"我从来没想过，一个人的出现，会让原本平淡的日子开始有了期待。",

"会在清晨醒来的时候，下意识想和你说一句早安。",

"喜欢看到晚霞时第一时间想到你。",

"喜欢那些平凡瞬间里慢慢长出来的在意。",

"你像一束温柔的光，照进我的生活。",

"喜欢你这件事，不是一时兴起。",

"而是在无数个瞬间里，越来越确定。"

]

let idx=0

const box=document.getElementById("text")

function showSentence(){

if(idx>=lines.length)return

let str=lines[idx]

let i=0

box.innerHTML=""

let timer=setInterval(()=>{

box.innerHTML+=str[i]

speak(str[i])

i++

if(i>=str.length){

clearInterval(timer)

setTimeout(()=>{

box.innerHTML=""

idx++

showSentence()

},2500)

}

},120)

}

function speak(txt){

let speech=new SpeechSynthesisUtterance(txt)

speech.lang="zh-CN"

speech.rate=0.95

speech.pitch=1

speech.volume=1

speechSynthesis.speak(speech)

}

function createHeart(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=(window.innerWidth/2-80+Math.random()*160)+"px"

h.style.top=(window.innerHeight/2+30)+"px"

document.body.appendChild(h)

setTimeout(()=>{

h.remove()

},4000)

}

setInterval(createHeart,350)

document.body.onclick=()=>{

document.getElementById("music").play()

showSentence()

document.querySelector(".tap").remove()

}

</script>

</body>
</html>
