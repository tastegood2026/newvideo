<style>
  :root{
    --bg-dark: rgba(5,8,12,.58);
    --panel: rgba(255,255,255,.06);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.62);
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  }

  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
  }

  #bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter: blur(18px) brightness(.36) saturate(.8) contrast(.98);
    transform: scale(1.08);
    z-index:-4;
  }

  #veil{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 50% 38%, rgba(255,255,255,.06), rgba(0,0,0,0) 42%),
      linear-gradient(180deg, rgba(0,0,0,.22), rgba(0,0,0,.68));
    z-index:-3;
  }

  #stars{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:-2;
  }

  .star{
    position:absolute;
    top:-10vh;
    color:rgba(255,255,255,.86);
    text-shadow:0 0 10px rgba(255,255,255,.4);
    filter: drop-shadow(0 0 8px rgba(255,255,255,.15));
    animation-name:fall;
    animation-timing-function:linear;
    animation-fill-mode:forwards;
    user-select:none;
    pointer-events:none;
  }

  @keyframes fall{
    0%{
      opacity:0;
      transform:translate3d(0,-8vh,0) rotate(0deg);
    }
    12%{opacity:1;}
    100%{
      opacity:0;
      transform:translate3d(var(--dx),110vh,0) rotate(360deg);
    }
  }

  .wrap{
    position:relative;
    z-index:1;
    width:min(92vw, 470px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:24px 12px 34px;
  }

  .avatar-shell{
    width:148px;
    height:148px;
    padding:8px;
    border-radius:50%;
    background:rgba(255,255,255,.06);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.11),
      0 16px 48px rgba(0,0,0,.36);
    backdrop-filter: blur(10px);
    animation:breathe 4.8s ease-in-out infinite;
  }

  .avatar-shell img{
    width:100%;
    height:100%;
    display:block;
    border-radius:50%;
    object-fit:cover;
    filter:grayscale(.08) brightness(.88) contrast(1.04);
  }

  @keyframes breathe{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.055);}
  }

  .title{
    font-size:14px;
    letter-spacing:.22em;
    color:rgba(255,255,255,.44);
    text-transform:uppercase;
    transform:translateY(2px);
    user-select:none;
  }

  #textBox{
    width:100%;
    min-height:168px;
    padding:4px 14px 0;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #text{
    width:100%;
    font-size:clamp(22px, 5vw, 30px);
    line-height:1.9;
    font-weight:600;
    color:var(--text);
    text-shadow:0 0 16px rgba(0,0,0,.42);
    opacity:0;
    transform:translateY(10px);
    transition:opacity .8s ease, transform .8s ease, letter-spacing .8s ease, font-size .8s ease;
    word-break:break-word;
    white-space:pre-wrap;
  }

  #text.show{
    opacity:1;
    transform:translateY(0);
  }

  #text.final{
    font-size:clamp(18px, 4vw, 22px);
    letter-spacing:.18em;
    color:rgba(255,255,255,.76);
    text-shadow:0 0 12px rgba(0,0,0,.34);
  }

  #text.tiny{
    font-size:18px;
    letter-spacing:.55em;
    color:rgba(255,255,255,.5);
    font-weight:500;
  }

  .char{
    display:inline-block;
    animation:charIn .22s ease both;
  }

  @keyframes charIn{
    0%{
      opacity:0;
      transform:translateY(10px) scale(.72);
      filter:blur(4px);
    }
    100%{
      opacity:1;
      transform:translateY(0) scale(1);
      filter:blur(0);
    }
  }

  .hint{
    color:var(--muted);
    font-size:13px;
    letter-spacing:.08em;
    margin-top:-2px;
    user-select:none;
  }

  #startMask{
    position:fixed;
    inset:0;
    z-index:20;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:16px;
    background:
      radial-gradient(circle at 50% 36%, rgba(255,255,255,.06), rgba(0,0,0,0) 34%),
      linear-gradient(180deg, rgba(0,0,0,.72), rgba(0,0,0,.52));
    backdrop-filter: blur(8px);
  }

  .startCard{
    width:min(86vw, 360px);
    padding:28px 22px 24px;
    border-radius:24px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 18px 40px rgba(0,0,0,.26);
    text-align:center;
  }

  .startTitle{
    font-size:18px;
    font-weight:700;
    letter-spacing:.08em;
    margin-bottom:10px;
  }

  .startSub{
    font-size:13px;
    line-height:1.8;
    color:rgba(255,255,255,.66);
    margin-bottom:18px;
  }

  #btn{
    border:none;
    outline:none;
    padding:15px 34px;
    border-radius:999px;
    font-size:17px;
    font-weight:700;
    color:#151515;
    background:linear-gradient(180deg, #efefef, #bfbfbf);
    box-shadow:0 12px 30px rgba(0,0,0,.28);
  }

  #btn:active{
    transform:scale(.97);
  }

  @media (max-width:480px){
    .avatar-shell{
      width:128px;
      height:128px;
    }
    #textBox{
      min-height:150px;
    }
    .title{
      font-size:12px;
    }
  }
</style>
</head>
