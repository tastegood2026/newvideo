<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>最后一次叫你宝宝</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Microsoft YaHei";
}

body{

background:url("images/bg.jpg") center center/cover no-repeat;
}

body::before{
content:"";
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
}

#start{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
z-index:99;

display:flex;
justify-content:center;
align-items:center;

background:#000;
color:#fff;
font-size:24px;
letter-spacing:4px;
}

#container{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
border:3px solid rgba(255,255,255,.8);

animation:breath 3s infinite;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes breath{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
}

#text{

margin-top:40px;

max-width:90%;

color:white;

font-size:26px;

line-height:1.8;

text-align:center;

min-height:150px;

text-shadow:0 0 15px rgba(255,255,255,.4);
}

.snow{
position:fixed;
top:-20px;
color:white;
pointer-events:none;
animation:snow linear forwards;
}

@keyframes snow{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div id="start">
点击屏幕开始
</div>

<div id="container">

<div class="avatar">
<img src="images/avatar.jpg">
</div>

<div id="text"></div>

</div>

<audio id="bgm" loop>
<source src="music/miss.mp3">
</audio>

<script>

const lines = [

"宝宝",

"这可能是我最后一次叫你宝宝了",

"我想了很久",

"也终于想通了",

"也许放手是我最好的选择",

"我爱你是真的",

"因为你伤心也是真的",

"我想或许我不再纠缠你",

"不再打扰你",

"你就能开心",

"我真的好喜欢你",

"但是我忘了",

"你没有遇到我时",

"那么开朗",

"那么爱笑",

"我就知道",

"我该放手了",

"我比任何人都爱你",

"但是我却比不过任何人",

"很抱歉这段时间对你的打扰",

"我只想你好好的",

"只想要你天天开心",

"我希望我的离开能让你开心",

"遇到你",

"是我这辈子最大的幸运",

"失去你",

"也是我最大的遗憾",

"再也不见了"

];

const text=document.getElementById("text");

function typeLine(content){

return new Promise(resolve=>{

text.innerHTML="";

let i=0;

let timer=setInterval(()=>{

text.innerHTML+=content.charAt(i);

i++;

if(i>=content.length){

clearInterval(timer);

setTimeout(resolve,2500);

}

},120);

});

}

async function showAll(){

for(let line of lines){

await typeLine(line);

}

}

document.getElementById("start").onclick=function(){

this.style.display="none";

document.getElementById("bgm").play();

showAll();

}

function snow(){

let s=document.createElement("div");

s.className="snow";

s.innerHTML="❄";

s.style.left=Math.random()*100+"vw";

s.style.fontSize=Math.random()*20+10+"px";

s.style.animationDuration=Math.random()*5+5+"s";

document.body.appendChild(s);

setTimeout(()=>{

s.remove();

},10000);

}

setInterval(snow,200);

</script>

</body>
</html>
