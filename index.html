<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>给你的最后一封信</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Microsoft YaHei";
}

body{
background:url("bg.png") center center/cover no-repeat;
}

body{
background-image:url("bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

#start{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:#000;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
font-size:24px;
letter-spacing:3px;
}

#heart{
font-size:60px;
margin-bottom:20px;
animation:heart 1.5s infinite;
}

@keyframes heart{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.25);
}
}

.container{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.avatar{
width:150px;
height:150px;
border-radius:50%;
overflow:hidden;
border:3px solid rgba(255,255,255,.8);
box-shadow:0 0 30px rgba(255,255,255,.3);
animation:avatarBreath 4s infinite;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes avatarBreath{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
}

#text{

margin-top:50px;

font-size:28px;

line-height:1.8;

color:#fff;

text-align:center;

max-width:90%;

min-height:120px;

text-shadow:0 0 15px rgba(255,255,255,.5);

}

.snow{
position:fixed;
top:-20px;
color:white;
pointer-events:none;
animation:snow linear forwards;
}

@keyframes snow{
to{
transform:translateY(110vh);
}
}

.fade{
animation:fade 1s forwards;
}

@keyframes fade{
to{
opacity:0;
}
}

</style>
</head>

<body>

<div id="start">
<div id="heart">❤</div>
<div>点击屏幕开始</div>
</div>

<div class="container">

<div class="avatar">
<img src="avatar.jpg">
</div>

<div id="text"></div>

</div>

<audio id="bgm" loop>
<source src="miss.mp3" type="audio/mpeg">
</audio>

<script>

const lines=[

"宝宝",

"这可能是我最后一次叫你宝宝了",

"我想了很久",

"也终于想通了",

"也许放手是我最好的选择",

"我爱你是真的",

"因为你伤心也是真的",

"我想或许我不再纠缠你",

"不再打扰你",

"你就能开心",

"我真的好喜欢你",

"但是我忘了",

"你没有遇到我时",

"那么开朗",

"那么爱笑",

"我就知道",

"我该放手了",

"我比任何人都爱你",

"但是我却比不过任何人",

"很抱歉这段时间对你的打扰",

"我只想你好好的",

"只想要你天天开心",

"我希望我的离开能让你开心",

"遇到你",

"是我这辈子最大的幸运",

"失去你",

"也是我最大的遗憾",

"再也不见了"

];

const text=document.getElementById("text");

function typeLine(str){

return new Promise(resolve=>{

text.innerHTML="";

let i=0;

let timer=setInterval(()=>{

text.innerHTML+=str.charAt(i);

i++;

if(i>=str.length){

clearInterval(timer);

setTimeout(()=>{

if(str!=="再也不见了"){

text.classList.add("fade");

setTimeout(()=>{

text.classList.remove("fade");

resolve();

},1000);

}else{

resolve();

}

},2500);

}

},120);

});

}

async function showLines(){

for(let item of lines){

await typeLine(item);

}

}

function createSnow(){

let snow=document.createElement("div");

snow.className="snow";

snow.innerHTML="❄";

snow.style.left=Math.random()*100+"vw";

snow.style.fontSize=(Math.random()*20+10)+"px";

snow.style.animationDuration=(Math.random()*6+5)+"s";

document.body.appendChild(snow);

setTimeout(()=>{

snow.remove();

},12000);

}

setInterval(createSnow,200);

document.getElementById("start").onclick=function(){

this.style.display="none";

document.getElementById("bgm").play();

showLines();

};

</script>

</body>
</html>
