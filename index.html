<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>给你的话</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
overflow:hidden;
height:100vh;
font-family:"Microsoft YaHei";
background:#000;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url(bg.jpg) center/cover;
filter:blur(6px) brightness(.45);
transform:scale(1.1);
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:5;
}

.avatar{
width:210px;
height:210px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:5px solid rgba(255,255,255,.9);
box-shadow:0 0 50px rgba(255,255,255,.8);
animation:breathe 3s infinite;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes breathe{
50%{transform:scale(1.05)}
}

.text{
width:360px;
min-height:180px;
margin-top:35px;
font-size:23px;
line-height:1.9;
color:white;
text-shadow:0 0 15px black;
transition:.45s;
}

.heart{
position:absolute;
pointer-events:none;
animation:fly linear forwards;
}

@keyframes fly{

0%{
opacity:1;
transform:translateY(0) scale(.7);
}

100%{
opacity:0;
transform:translateY(-350px) scale(1.8);
}

}

.tap{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
color:white;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="avatar">
<img src="avatar.jpg">
</div>

<div id="text" class="text"></div>

</div>

<div class="tap">点击开始</div>

<audio id="music" loop playsinline>
<source src="music.mp3">
</audio>

<script>

const raw=`提笔写下这些话的时候，窗外的风似乎都温柔了几分，而我的脑海里，反反复复浮现的，都是你的模样。

我从来没想过，一个人的出现，会让原本平淡的日子开始有了期待。会在清晨醒来的时候，下意识想和你说一句早安。

会在看到好看的晚霞、遇见有趣的事情、吃到好吃的东西时，第一时间想分享给你。

这份喜欢，没有轰轰烈烈的开场，也没有刻意制造的浪漫。

你像一束温柔的光，悄悄照进我的生活。

喜欢你这件事，不是一时兴起，而是在无数个平凡瞬间里，越来越确定的答案。`

const lines=raw
.replace(/\n/g,"")
.split(/[，。！？；]/)
.map(v=>v.trim())
.filter(Boolean)

const text=document.getElementById("text")

let idx=0

function typeSentence(str){

text.innerHTML=""

let i=0

let timer=setInterval(()=>{

if(i<str.length){

text.innerHTML+=str[i]

i++

}else{

clearInterval(timer)

}

},45)

}

function speak(str){

speechSynthesis.cancel()

let speech=new SpeechSynthesisUtterance(str)

speech.lang="zh-CN"

speech.rate=0.98

speech.pitch=0.75

speech.volume=1

let voices=speechSynthesis.getVoices()

let maleVoice=voices.find(v=>

v.lang.includes("zh") ||

v.name.includes("Male")

)

if(maleVoice){

speech.voice=maleVoice

}

speech.onend=()=>{

text.style.opacity=0

setTimeout(()=>{

idx++

playNext()

},250)

}

speechSynthesis.speak(speech)

}

function playNext(){

if(idx>=lines.length){

text.innerHTML="❤"

return

}

text.style.opacity=1

typeSentence(lines[idx])

speak(lines[idx])

}

function heart(){

const h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=Math.random()*window.innerWidth+"px"

h.style.top=window.innerHeight+"px"

h.style.fontSize=(25+Math.random()*40)+"px"

h.style.animationDuration=(2+Math.random()*2)+"s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),4000)

}

setInterval(heart,100)

document.body.addEventListener("click",()=>{

document.querySelector(".tap").remove()

document.getElementById("music").play()

playNext()

},{once:true})

</script>

</body>
</html>
